<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E&amp;E – Intro</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }

    /* ── SCENE ── */
    #scene {
      position: relative;
      width: 100vw; height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, #0d0c0a 0%, #000 100%);
    }

    /* ── PARTICLES ── */
    #particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, #c8a96e 0%, transparent 70%);
      animation: float linear infinite;
      opacity: 0;
    }
    @keyframes float {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.4; }
      90%  { opacity: 0.15; }
      100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
    }

    /* ── HORIZONTAL RULE LINES ── */
    .h-line {
      position: absolute;
      left: 50%; transform: translateX(-50%);
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c8a96e 30%, #f0d89a 50%, #c8a96e 70%, transparent);
      animation: expandLine 1.2s cubic-bezier(.4,0,.2,1) forwards;
    }
    .h-line.top    { top: calc(50% - 120px); animation-delay: 0.4s; }
    .h-line.bottom { top: calc(50% + 120px); animation-delay: 0.4s; }
    @keyframes expandLine {
      from { width: 0; opacity: 0; }
      to   { width: min(560px, 80vw); opacity: 1; }
    }

    /* ── CORNER ORNAMENTS ── */
    .corner {
      position: absolute;
      width: 28px; height: 28px;
      border-color: #c8a96e;
      border-style: solid;
      opacity: 0;
      animation: fadeCorner 0.8s ease forwards;
      animation-delay: 1.2s;
    }
    .corner.tl { top: calc(50% - 126px); left: calc(50% - 284px); border-width: 1px 0 0 1px; }
    .corner.tr { top: calc(50% - 126px); right: calc(50% - 284px); border-width: 1px 1px 0 0; }
    .corner.bl { bottom: calc(50% - 126px); left: calc(50% - 284px); border-width: 0 0 1px 1px; }
    .corner.br { bottom: calc(50% - 126px); right: calc(50% - 284px); border-width: 0 1px 1px 0; }
    @keyframes fadeCorner {
      from { opacity: 0; transform: scale(0.4); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── CENTRAL CONTENT ── */
    #content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      z-index: 10;
    }

    /* ── TAGLINE TOP ── */
    .tagline-top {
      font-family: 'Cinzel', serif;
      font-size: clamp(9px, 1.1vw, 11px);
      letter-spacing: 0.45em;
      color: #c8a96e;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(12px);
      animation: riseIn 1s ease forwards;
      animation-delay: 1.6s;
    }

    /* ── MONOGRAM ── */
    #monogram {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .letter {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(110px, 18vw, 200px);
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 1px #c8a96e;
      letter-spacing: -0.02em;
      opacity: 0;
      position: relative;
    }
    .letter.e1 { animation: revealLeft 1.2s cubic-bezier(.16,1,.3,1) forwards; animation-delay: 0.8s; }
    .letter.amp {
      font-size: clamp(42px, 6vw, 72px);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      color: #c8a96e;
      -webkit-text-stroke: 0;
      margin: 0 2px;
      padding-bottom: 0.4em;
      opacity: 0;
      animation: fadeScaleIn 1s ease forwards;
      animation-delay: 1.2s;
    }
    .letter.e2 { animation: revealRight 1.2s cubic-bezier(.16,1,.3,1) forwards; animation-delay: 0.8s; }

    /* Gold fill sweep on letters */
    .letter::after {
      content: attr(data-char);
      position: absolute;
      inset: 0;
      font-family: inherit;
      font-size: inherit;
      font-weight: inherit;
      line-height: inherit;
      color: #c8a96e;
      clip-path: inset(0 100% 0 0);
      animation: sweepFill 1.6s cubic-bezier(.4,0,.2,1) forwards;
      animation-delay: 1.4s;
    }
    @keyframes sweepFill {
      from { clip-path: inset(0 100% 0 0); }
      to   { clip-path: inset(0 0% 0 0); }
    }

    /* Shimmer overlay on letters */
    .letter-wrap {
      position: relative;
      overflow: hidden;
    }
    .letter-wrap::after {
      content: '';
      position: absolute;
      top: -60%; left: -80%;
      width: 60%; height: 220%;
      background: linear-gradient(105deg, transparent 30%, rgba(255,220,130,0.55) 50%, transparent 70%);
      transform: skewX(-15deg);
      animation: shimmer 3s ease-in-out infinite;
      animation-delay: 2.6s;
      pointer-events: none;
    }
    @keyframes shimmer {
      0%   { left: -80%; opacity: 0; }
      10%  { opacity: 1; }
      60%  { left: 160%; opacity: 1; }
      61%  { opacity: 0; }
      100% { left: 160%; opacity: 0; }
    }

    @keyframes revealLeft {
      from { opacity: 0; transform: translateX(-40px) scale(0.9); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes revealRight {
      from { opacity: 0; transform: translateX(40px) scale(0.9); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes fadeScaleIn {
      from { opacity: 0; transform: scale(0.6) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── DIVIDER DOT ROW ── */
    .dot-row {
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: riseIn 0.8s ease forwards;
      animation-delay: 2s;
    }
    .dot-row span {
      display: block;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: #c8a96e;
    }
    .dot-row .dash {
      width: 36px; height: 1px;
      border-radius: 0;
      background: linear-gradient(90deg, transparent, #c8a96e, transparent);
    }

    /* ── TAGLINE BOTTOM ── */
    .tagline-bottom {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(13px, 1.8vw, 17px);
      letter-spacing: 0.25em;
      color: #d4b87a;
      text-transform: lowercase;
      opacity: 0;
      transform: translateY(12px);
      animation: riseIn 1s ease forwards;
      animation-delay: 2.2s;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── VIGNETTE ── */
    #vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 85% 75% at 50% 50%, transparent 55%, rgba(0,0,0,0.65) 100%);
      pointer-events: none;
      z-index: 5;
    }

    /* ── OVERALL FADE IN ── */
    #scene {
      animation: sceneFadeIn 1s ease forwards;
    }
    @keyframes sceneFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── GOLDEN RING (decorative) ── */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(200, 169, 110, 0.18);
      animation: pulse 4s ease-in-out infinite;
      pointer-events: none;
    }
    .ring.r1 { width: 420px; height: 420px; animation-delay: 0s; }
    .ring.r2 { width: 600px; height: 600px; animation-delay: 0.8s; }
    .ring.r3 { width: 780px; height: 780px; animation-delay: 1.6s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.0; transform: scale(0.97); }
      50%       { opacity: 1;   transform: scale(1.02); }
    }
  </style>
</head>
<body>
  <div id="scene">

    <!-- Rings -->
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>

    <!-- Particles -->
    <div id="particles"></div>

    <!-- Vignette -->
    <div id="vignette"></div>

    <!-- H-Lines -->
    <div class="h-line top"></div>
    <div class="h-line bottom"></div>

    <!-- Corner ornaments -->
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <!-- Central content -->
    <div id="content">
      <div class="tagline-top">est. forever</div>

      <div id="monogram">
        <div class="letter-wrap">
          <span class="letter e1" data-char="E">E</span>
        </div>
        <span class="letter amp">&amp;</span>
        <div class="letter-wrap">
          <span class="letter e2" data-char="E">E</span>
        </div>
      </div>

      <div class="dot-row">
        <span class="dash"></span>
        <span></span>
        <span></span>
        <span></span>
        <span class="dash"></span>
      </div>

      <div class="tagline-bottom">forever begins today</div>
    </div>

  </div>

  <script>
    // ── Generate floating particles ──
    const container = document.getElementById('particles');
    const count = 38;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 3 + 1;
      p.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${Math.random() * 100}%;
        animation-duration: ${6 + Math.random() * 10}s;
        animation-delay: ${Math.random() * 8}s;
      `;
      container.appendChild(p);
    }
  </script>
</body>
</html>
